<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Inscripción</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <div class="card">

    <div class="card-header">
      <span style="font-size:3rem; line-height:1;"></span>
      <div>
        <h1>Formulario de inscripción</h1>
        <p>Completa todos los campos para registrarte al torneo</p>
      </div>
    </div>

    <form>

      <div class="section-block">
        <div class="section-label">Datos Personales</div>
        <div class="row g-3">
          <div class="col-sm-6">
            <label class="form-label">Nombre completo</label>
            <input type="text" class="form-control" placeholder="Ej. Juan Pérez López">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Número de teléfono</label>
            <input type="tel" class="form-control" placeholder="Ej. 33 1234 5678">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" placeholder="Calle, número, colonia">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Fecha de nacimiento</label>
            <input type="text" class="form-control" placeholder="dd / mm / aaaa">
          </div>
        </div>
      </div>

      <!-- Datos del Equipo -->
      <div class="section-block">
        <div class="section-label">Datos del Equipo</div>
        <div class="row g-3">
          <div class="col-sm-6">
            <label class="form-label">Nombre del equipo</label>
            <input type="text" class="form-control" placeholder="Ej. Leones FC">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Número de jugador</label>
            <input type="number" class="form-control" placeholder="Ej. 10">
          </div>
          <div class="col-12">
            <label class="form-label">Posición</label>
            <input type="text" class="form-control" placeholder="Ej. Delantero, Portero...">
          </div>
        </div>
      </div>

      <!-- Información Médica -->
      <div class="section-block">
        <div class="section-label">Información Médica</div>
        <div class="row g-3">
          <div class="col-sm-6">
            <label class="form-label">Alergias</label>
            <textarea class="form-control" placeholder="Escribe si tienes alguna alergia"></textarea>
          </div>
          <div class="col-sm-6">
            <label class="form-label">
              Seguro social
              <span class="optional-badge">opcional</span>
            </label>
            <input type="text" class="form-control" placeholder="XXXX-XXXX-XX">
          </div>
        </div>
      </div>

      <!-- Confirmación -->
      <div class="section-block">
        <div class="section-label">Confirmación</div>
        <div class="confirmation-box">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="aceptar">
            <label class="form-check-label" for="aceptar">
              Acepto participar bajo mi propia responsabilidad y reconozco que he leído los términos del evento.
            </label>
          </div>
        </div>
      </div>

      <!-- Botón -->
      <div>
        <button type="submit" class="btn btn-submit">Enviar inscripción</button>
      </div>

    </form>
  </div>

</body>
</html>
